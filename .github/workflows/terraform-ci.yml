name: Terraform CI/CD



on:
  pull_request:
    branches: [main]
    paths:
      - '**.tf'
      - '**.tfvars'
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - '**.tf'
      - '**.tfvars'
      - '.github/workflows/**'


permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.15.6"
  AWS_REGION: "us-east-1"

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::018881301386:role/GitHubActionsTerraformRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        working-directory: environments/dev
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        working-directory: environments/dev
        run: terraform init

      - name: Terraform Validate
        id: validate
        working-directory: environments/dev
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        working-directory: environments/dev
        run: terraform plan -var-file="terraform.tfvars" -no-color -input=false
        continue-on-error: true

      - name: Post Plan to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN_OUTPUT: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const plan = process.env.PLAN_OUTPUT || 'No output';
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n...' : plan;
            const body = `## Terraform Plan Results\n\n| Check | Status |\n|-------|--------|\n| Format | ${{ steps.fmt.outcome }} |\n| Init | ${{ steps.init.outcome }} |\n| Validate | ${{ steps.validate.outcome }} |\n| Plan | ${{ steps.plan.outcome }} |\n\n<details><summary>Click to expand plan</summary>\n\n\`\`\`terraform\n${truncated}\n\`\`\`\n\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Check Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::018881301386:role/GitHubActionsTerraformRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: environments/dev
        run: terraform init

      #- name: Debug Terraform State
      #  working-directory: environments/dev
      #  run: terraform state list
      
      #- name: Terraform Import Existing Resources
      #  run: |
       #   terraform import aws_iam_openid_connect_provider.github 
       #   arn:aws:iam::018881301386:oidc-provider/token.actions.githubusercontent.com || true
       #   terraform import aws_iam_role.github_actions GitHubActionsTerraformRole || true
       #   terraform import aws_iam_role_policy_attachment.admin GitHubActionsTerraformRole/arn:aws:iam::aws:policy/AdministratorAccess || true    

      - name: Terraform Apply
        working-directory: environments/dev
        run: terraform apply -var-file="terraform.tfvars" -auto-approve -input=false
